<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#18181b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Paperclip" />
    <title>Paperclip</title>
    <script>
      if (window.location.search.includes("clear_cache")) {
        console.warn("CACHE CLEAR REQUESTED");
        localStorage.clear();
        sessionStorage.clear();
        if ("caches" in window) {
          caches.keys().then(keys => Promise.all(keys.map(key => caches.delete(key))));
        }
      }
      window.onerror = function(msg, url, line, col, error) {
        console.error("GLOBAL ERROR:", msg, "at", url, ":", line, ":", col);
        const errDiv = document.createElement("div");
        errDiv.style.cssText = "background:rgba(255,0,0,0.9);color:white;padding:20px;position:fixed;top:0;left:0;z-index:99999;width:100%;font-family:monospace;white-space:pre-wrap;box-sizing:border-box;border-bottom:2px solid white;";
        errDiv.textContent = "CRITICAL UI ERROR: " + msg + "\nFile: " + url + "\nLine: " + line;
        document.body.prepend(errDiv);
      };
      window.addEventListener("error", function(e) {
        if (e.target.tagName === "SCRIPT" || e.target.tagName === "LINK") {
          console.error("NETWORK ERROR:", e.target.src || e.target.href);
          const errDiv = document.createElement("div");
          errDiv.style.cssText = "background:orange;color:white;padding:10px;position:fixed;bottom:0;left:0;z-index:99999;width:100%;font-family:monospace;font-size:12px;";
          errDiv.textContent = "FAILED TO LOAD ASSET: " + (e.target.src || e.target.href);
          document.body.appendChild(errDiv);
        }
      }, true);
      window.onunhandledrejection = function(event) {
        console.error("UNHANDLED REJECTION:", event.reason);
      };
    </script>
    <!-- PAPERCLIP_RUNTIME_BRANDING_START -->
    <!-- PAPERCLIP_RUNTIME_BRANDING_END -->
    <!-- PAPERCLIP_FAVICON_START -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <!-- PAPERCLIP_FAVICON_END -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        const key = "paperclip.theme";
        const darkThemeColor = "#18181b";
        const lightThemeColor = "#ffffff";
        try {
          const stored = window.localStorage.getItem(key);
          const theme = stored === "light" || stored === "dark" ? stored : "dark";
          const isDark = theme === "dark";
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
          const themeColorMeta = document.querySelector('meta[name="theme-color"]');
          if (themeColorMeta) {
            themeColorMeta.setAttribute("content", isDark ? darkThemeColor : lightThemeColor);
          }
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
